<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Veloura favicon">
  <defs>
    <linearGradient id="fav-gold" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#E8C98C"/>
      <stop offset="50%"  stop-color="#C9A46A"/>
      <stop offset="100%" stop-color="#A88451"/>
    </linearGradient>
  </defs>

  <!-- Curva izquierda de la V — trazo fluido -->
  <path
    d="M 6 10
       Q 7 9, 8.5 9.5
       Q 11 12, 14 18
       Q 16 22, 17.5 26
       L 16.5 26.5
       Q 14.5 22.5, 12 18
       Q 9 13, 7 11
       Q 6.5 10.3, 6 10 Z"
    fill="url(#fav-gold)"
  />

  <!-- Curva derecha de la V con el perfil estilizado -->
  <path
    d="M 26 8
       Q 25 14, 22.5 19
       Q 21 22, 19 24
       Q 18.5 25, 18 26
       L 17 25.5
       Q 19 22, 20.5 19
       Q 22.5 14.5, 23.5 11
       Q 24.5 9, 26 8 Z"
    fill="url(#fav-gold)"
  />

  <!-- Pequeña curvatura tipo "cabello" superior derecha -->
  <path
    d="M 24 7
       Q 25.5 6.5, 26.5 7
       Q 26.8 8, 26 8.5
       Q 25 8, 24 8 Z"
    fill="url(#fav-gold)"
  />
</svg>

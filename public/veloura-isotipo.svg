<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Veloura isotipo">
  <defs>
    <linearGradient id="vgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E1C690"/>
      <stop offset="50%"  stop-color="#C9A46A"/>
      <stop offset="100%" stop-color="#9C7338"/>
    </linearGradient>
  </defs>

  <!-- Forma "V" estilizada que envuelve el perfil -->
  <path
    d="M 40 50
       C 60 90, 80 120, 100 145
       C 120 120, 140 90, 160 50
       L 145 50
       C 130 85, 115 110, 100 125
       C 85 110, 70 85, 55 50
       Z"
    fill="url(#vgold)"
  />

  <!-- Pequeño detalle de perfil dentro de la V (silueta de cara mirando a la derecha) -->
  <path
    d="M 100 75
       C 108 75, 113 80, 113 88
       C 113 92, 111 95, 108 97
       L 108 102
       L 113 102
       L 113 108
       L 108 108
       L 108 115
       C 108 118, 106 120, 102 120
       L 96 120
       C 92 120, 90 117, 90 113
       L 90 95
       C 88 92, 87 88, 87 84
       C 87 78, 92 75, 100 75 Z"
    fill="url(#vgold)"
    opacity="0.85"
  />
</svg>

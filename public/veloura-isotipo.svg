<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" role="img" aria-label="Veloura isotipo">
  <defs>
    <linearGradient id="v-gold-real" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#E8C98C"/>
      <stop offset="40%"  stop-color="#D4B17C"/>
      <stop offset="100%" stop-color="#A88451"/>
    </linearGradient>
  </defs>

  <!-- Trazo izquierdo de la V (curva fluida desde arriba-izquierda hasta el centro-bajo) -->
  <path
    d="M 130 220
       Q 145 215, 165 222
       Q 195 245, 220 290
       Q 260 360, 295 440
       Q 305 460, 312 478
       L 298 480
       Q 280 440, 255 390
       Q 220 320, 185 270
       Q 165 245, 145 232
       Q 135 225, 130 220 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Cola superior izquierda — pequeña punta que sale hacia arriba -->
  <path
    d="M 145 210
       Q 138 200, 135 188
       Q 140 192, 148 200
       Q 152 205, 155 213
       Z"
    fill="url(#v-gold-real)"
  />

  <!-- Trazo derecho — la parte superior es la "espalda" del cabello (curva amplia hacia arriba-derecha) -->
  <path
    d="M 355 130
       Q 390 110, 425 115
       Q 460 122, 475 145
       Q 478 155, 472 168
       Q 460 188, 440 210
       L 418 205
       Q 405 195, 395 188
       Q 395 175, 388 165
       Q 378 153, 365 145
       Q 358 140, 355 130 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Cabello y corona — forma redondeada en la parte alta de la cabeza -->
  <path
    d="M 415 165
       Q 460 162, 490 200
       Q 498 220, 490 250
       Q 478 285, 460 310
       Q 442 335, 420 350
       L 412 290
       Q 425 270, 432 250
       Q 438 230, 432 210
       Q 425 195, 415 185 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Mejilla / lateral de la cara — conecta el cabello con la línea del perfil -->
  <path
    d="M 410 280
       Q 415 305, 410 330
       L 405 380
       Q 402 410, 395 432
       L 380 432
       Q 388 405, 392 375
       L 395 320
       Q 398 297, 405 282 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Perfil del rostro (frente, nariz, labios, mentón) — line art elegante -->
  <path
    d="M 375 230
       Q 376 250, 374 268
       L 374 280
       Q 380 286, 388 290
       Q 395 295, 392 302
       L 386 306
       Q 380 308, 378 314
       L 378 322
       Q 380 326, 384 328
       L 388 330
       Q 386 336, 382 340
       L 376 348
       Q 374 354, 376 360
       Q 380 366, 386 372
       Q 388 380, 384 385
       L 378 388
       L 376 400
       Q 374 412, 366 418
       Q 358 424, 348 422
       L 340 420
       Q 334 414, 334 405
       L 334 380
       Q 332 365, 334 348
       Q 336 325, 342 305
       Q 348 280, 358 258
       Q 366 240, 375 230 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Continuación del cabello bajando por la derecha (parte derecha de la V) -->
  <path
    d="M 415 340
       Q 425 380, 430 420
       Q 432 460, 425 495
       Q 415 530, 395 555
       Q 380 575, 360 590
       L 345 580
       Q 365 562, 380 540
       Q 395 515, 402 488
       Q 410 455, 408 422
       Q 405 390, 398 360 Z"
    fill="url(#v-gold-real)"
  />

  <!-- Punto inferior de unión — donde se juntan ambas curvas de la V -->
  <path
    d="M 312 478
       Q 320 482, 330 480
       Q 345 478, 355 478
       L 360 580
       Q 350 588, 340 592
       Q 325 596, 315 590
       L 308 580
       Q 305 540, 308 500
       Z"
    fill="url(#v-gold-real)"
    opacity="0.92"
  />

  <!-- Cola inferior derecha — pequeño rabito final que sale debajo-derecha -->
  <path
    d="M 360 580
       Q 380 595, 400 612
       Q 392 615, 380 610
       Q 368 600, 360 588 Z"
    fill="url(#v-gold-real)"
  />
</svg>

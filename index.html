<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Veloura brand icons ── -->
    <!-- Favicon principal: Monograma Carbon, nitidez pixel-perfect en todos los tamaños -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback PNG para navegadores que no soporten SVG favicon -->
    <link rel="alternate icon" type="image/png" href="/logo.png" />
    <!-- Apple Touch Icon: Monograma Cream sobre fondo Carbon, 180×180 -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.svg" />
    <!-- PWA manifest con iconos Carbon actualizados -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Meta de tema ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- theme-color Carbon para barra de estado de navegadores y Android Chrome -->
    <meta name="theme-color" content="#161313" />
    <!-- iOS standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: permite que la barra de estado sea transparente sobre el fondo Carbon -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veloura" />

    <!-- ── SEO ── -->
    <title>VELOURA OS</title>
    <meta name="description" content="Veloura: gestión integral para clínicas de medicina estética. Pacientes, agenda, análisis dermoscópico asistido y protocolos personalizados." />

    <!-- ── Fuentes ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter (legacy, mantener para compatibilidad con Tailwind) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Sistema tipográfico Veloura: Fraunces Display + DM Sans + DM Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
